<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="form-box">

            <h2 class="text-center mb-4">Student Registration Form</h2>
            <form id="studentForm">

                <div class="row">
                    <div class="col-sm-6 mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Enter full name">
                    </div>

                    <div class="col-sm-6 mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" id="age" class="form-control" placeholder="Enter age">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone number</label>
                    <input type="text" id="phone" class="form-control" placeholder="Enter Phone no.">
                </div>

                <div class="mb-3">
                    <label for="course" class="form-label">Course</label>
                    <select id="course" class="form-select">
                        <option value="">Select course</option>
                        <option value="BE">BE</option>
                        <option value="BTECH">BTECH</option>
                        <option value="BSC">BSC</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="gender" class="form-label">Gender</label>
                    <div class="pt-2">
                        <input type="radio" name="gender" value="Male">Male

                        <input type="radio" name="gender" value="Female">Female

                        <input type="radio" name="gender" value="Other">Other
                    </div>
                </div>

                <div class="text-center mt-2">
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>

            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
